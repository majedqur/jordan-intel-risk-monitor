name: Collect News

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > service-account.json

      - name: Collect RSS signals into Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_PATH: ./service-account.json
          FIREBASE_DATABASE_ID: ${{ secrets.FIREBASE_DATABASE_ID }}
          NEWS_FEEDS: ${{ secrets.NEWS_FEEDS }}
        run: npm run collect:news
